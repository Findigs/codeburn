name: Release macOS Menubar

# Builds on every push to main, PRs, and manual dispatch.
# Every main push creates a GitHub Release (tagged releases use the tag name,
# other main pushes auto-release as mac-ci-<sha>).
on:
  push:
    branches: [main]
    tags:
      - 'mac-v*'
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the bundle (e.g. v0.8.0 or dev-preview)'
        required: true
        default: 'dev-preview'

permissions:
  contents: write  # Needed to create the release + upload assets.

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version label
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/mac-v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/mac-}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=ci-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show Swift toolchain
        run: swift --version

      - name: Build + bundle + zip
        run: mac/Scripts/package-app.sh "${{ steps.version.outputs.value }}"

      - name: Generate SHA-256 checksums
        run: |
          cd mac/.build/dist
          for zip in CodeBurnMenubar-*.zip; do
            shasum -a 256 "$zip" | awk '{print $1}' > "${zip}.sha256"
            echo "SHA-256 for ${zip}: $(cat "${zip}.sha256")"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeBurnMenubar-${{ steps.version.outputs.value }}
          path: |
            mac/.build/dist/CodeBurnMenubar-*.zip
            mac/.build/dist/CodeBurnMenubar-*.zip.sha256
          if-no-files-found: error

      - name: Create / update GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/mac-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mac-${{ steps.version.outputs.value }}
          name: Menubar ${{ steps.version.outputs.value }}
          body: |
            Install with:

            ```
            npx github:Findigs/codeburn menubar
            ```

            That command drops the app into `~/Applications`, clears the download
            quarantine, and launches it. If you download the zip from this page directly
            and macOS shows "cannot verify developer", right-click the app in Finder and
            pick Open to whitelist it once.

            The installer verifies the download against the `.sha256` checksum
            file published alongside each zip.
          files: |
            mac/.build/dist/CodeBurnMenubar-*.zip
            mac/.build/dist/CodeBurnMenubar-*.zip.sha256
          fail_on_unmatched_files: true
